services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quality
      POSTGRES_PASSWORD: quality
      POSTGRES_DB: quality_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quality"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
